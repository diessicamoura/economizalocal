<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EconomizaLocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #059669; border-top: 3px solid #059669; }
        #toast {
            visibility: hidden; min-width: 200px; background-color: #059669; color: #fff;
            text-align: center; border-radius: 50px; padding: 12px; position: fixed;
            z-index: 100; left: 50%; transform: translateX(-50%); top: 20px; font-weight: bold; font-size: 12px;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 20px; opacity: 1;} }
        @keyframes fadeout { from {top: 20px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <div id="toast">LISTA ATUALIZADA!</div>
    
    <header class="bg-blue-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <h1 class="text-lg font-bold mb-3"><i class="fas fa-shopping-basket"></i> EconomizaLocal</h1>
        <div class="relative">
            <input type="text" id="mainSearch" onkeyup="filtrarProdutos()" placeholder="O que você precisa?" 
                class="w-full p-3 pl-10 rounded-2xl text-gray-800 text-sm outline-none">
            <i class="fas fa-search absolute left-3 top-3.5 text-gray-400"></i>
        </div>
    </header>

    <main class="px-4 pt-4 pb-28">
        <section id="tab-melhor-preco" class="tab-content active">
            <h2 class="text-xs font-black text-gray-400 uppercase mb-3">🛒 Comparativo de Preços</h2>
            <div class="grid gap-4" id="comparativo-geral"></div>
        </section>
        
        <section id="tab-carrinho" class="tab-content">
            <h2 class="text-sm font-bold text-gray-800 mb-4 text-center uppercase">Minha Lista</h2>
            <div id="carrinho-vazio" class="text-center py-10"><i class="fas fa-receipt text-gray-300 text-6xl mb-4"></i><p class="text-gray-400">Sua lista está vazia</p></div>
            <div id="resumo-carrinho" class="space-y-3"></div>
            
            <div id="area-compartilhar" class="mt-8 p-6 bg-white rounded-3xl border text-center hidden shadow-sm">
                <p class="text-[10px] font-bold text-gray-400 mb-4 uppercase">Compartilhar App</p>
                <div id="qrcode" class="flex justify-center mb-4"></div>
                <button onclick="limparLista()" class="text-red-400 text-xs font-bold uppercase py-2">Limpar Lista</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-2 z-50 shadow-inner">
        <button onclick="showTab('melhor-preco', this)" class="nav-btn active flex flex-col items-center w-full"><i class="fas fa-tag text-xl"></i><span class="text-[9px] font-bold">PREÇOS</span></button>
        <button onclick="showTab('carrinho', this)" class="nav-btn flex flex-col items-center w-full text-gray-400"><i class="fas fa-list-check text-xl"></i><span class="text-[9px] font-bold">MINHA LISTA</span></button>
    </nav>

    <script>
        // --- BASE DE DADOS (EDITE OS PREÇOS AQUI) ---
        const produtos = [
            { id: 1, nome: "Leite 1L", marca: "Piracanjuba", precoM1: 4.89, precoM2: 5.20, precoM3: 4.75, icone: "fa-glass-water" },
            { id: 2, nome: "Arroz 5kg", marca: "Tio João", precoM1: 29.90, precoM2: 31.50, precoM3: 28.50, icone: "fa-seedling" },
            { id: 3, nome: "Feijão 1kg", marca: "Carioca", precoM1: 8.50, precoM2: 7.90, precoM3: 8.20, icone: "fa-circle" },
            { id: 4, nome: "Óleo 900ml", marca: "Soya", precoM1: 6.80, precoM2: 6.50, precoM3: 6.90, icone: "fa-bottle-droplet" },
            { id: 5, nome: "Café 500g", marca: "Melitta", precoM1: 18.90, precoM2: 17.50, precoM3: 19.20, icone: "fa-mug-hot" }
        ];

        const mercados = [{ id: 'M1', nome: "Copagril" }, { id: 'M2', nome: "Waimann" }, { id: 'M3', nome: "Dilettare" }];
        let minhaLista = JSON.parse(localStorage.getItem('economiza_lista')) || [];

        function salvar() { localStorage.setItem('economiza_lista', JSON.stringify(minhaLista)); }

        function renderizarHome(lista) {
            const cont = document.getElementById('comparativo-geral');
            cont.innerHTML = lista.map(p => {
                const item = minhaLista.find(i => i.id === p.id);
                const qtd = item ? item.quantidade : 0;
                return `
                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                                <i class="fas ${p.icone} text-lg"></i>
                            </div>
                            <div><h4 class="font-bold text-gray-800 text-sm">${p.nome}</h4><p class="text-[10px] text-gray-400 font-bold uppercase">${p.marca}</p></div>
                        </div>
                        ${renderSeletor(p.id, qtd)}
                    </div>
                    <div class="grid grid-cols-3 gap-2 pt-3 border-t border-dashed">
                        ${mercados.map(m => `
                            <div class="text-center">
                                <p class="text-[8px] text-gray-400 uppercase font-bold">${m.nome}</p>
                                <p class="text-xs font-black ${Math.min(p.precoM1, p.precoM2, p.precoM3) == p['preco'+m.id] ? 'text-green-600' : 'text-slate-700'}">R$ ${p['preco'+m.id].toFixed(2)}</p>
                            </div>`).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function renderSeletor(id, qtd) {
            if (qtd === 0) return `<button onclick="add(${id})" class="bg-blue-700 text-white text-[10px] px-4 py-2 rounded-xl font-bold shadow-md active:scale-95 transition">ADD</button>`;
            return `<div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl">
                <button onclick="remove(${id})" class="w-8 h-8 bg-white rounded-lg text-red-500 shadow-sm"><i class="fas ${qtd === 1 ? 'fa-trash-alt' : 'fa-minus'} text-xs"></i></button>
                <span class="text-sm font-black text-blue-700 w-5 text-center">${qtd}</span>
                <button onclick="add(${id})" class="w-8 h-8 bg-blue-700 rounded-lg text-white shadow-sm"><i class="fas fa-plus text-xs"></i></button>
            </div>`;
        }

        function add(id) {
            const item = minhaLista.find(i => i.id === id);
            if (item) item.quantidade++; else { const p = produtos.find(x => x.id === id); minhaLista.push({...p, quantidade: 1}); }
            salvar(); atualizar();
        }

        function remove(id) {
            const item = minhaLista.find(i => i.id === id);
            if (item.quantidade > 1) item.quantidade--; else minhaLista = minhaLista.filter(i => i.id !== id);
            salvar(); atualizar();
        }

        function atualizar() {
            filtrarProdutos();
            renderizarCarrinho();
            const x = document.getElementById("toast"); x.className = "show"; setTimeout(() => x.className = "", 2000);
        }

        function renderizarCarrinho() {
            const cont = document.getElementById('resumo-carrinho');
            const vazio = document.getElementById('carrinho-vazio');
            const shareArea = document.getElementById('area-compartilhar');
            if(minhaLista.length === 0) { cont.innerHTML = ''; vazio.classList.remove('hidden'); shareArea.classList.add('hidden'); return; }
            vazio.classList.add('hidden'); shareArea.classList.remove('hidden');
            
            let totais = { M1: 0, M2: 0, M3: 0 };
            minhaLista.forEach(p => { totais.M1 += (p.precoM1 * p.quantidade); totais.M2 += (p.precoM2 * p.quantidade); totais.M3 += (p.precoM3 * p.quantidade); });
            const minTotal = Math.min(totais.M1, totais.M2, totais.M3);

            cont.innerHTML = mercados.map(m => `
                <div class="bg-white rounded-3xl shadow-sm border p-4 flex justify-between items-center ${totais[m.id] === minTotal ? 'ring-2 ring-green-500 border-transparent' : ''}">
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm">${m.nome}</h3>
                        <p class="text-[9px] text-gray-400 font-bold uppercase">${minhaLista.length} itens na lista</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black ${totais[m.id] === minTotal ? 'text-green-600' : 'text-slate-400'}">R$ ${totais[m.id].toFixed(2)}</p>
                        ${totais[m.id] === minTotal ? '<span class="text-[8px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">ECONOMIA</span>' : ''}
                    </div>
                </div>`).join('');
            
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 100, height: 100 });
        }

        function filtrarProdutos() {
            const termo = document.getElementById('mainSearch').value.toLowerCase();
            renderizarHome(produtos.filter(p => p.nome.toLowerCase().includes(termo)));
        }

        function showTab(id, el) { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.add('text-gray-400'); b.classList.remove('active'); });
            document.getElementById('tab-' + id).classList.add('active');
            el.classList.add('active'); el.classList.remove('text-gray-400');
            if(id === 'carrinho') renderizarCarrinho();
        }

        function limparLista() { if(confirm("Deseja apagar sua lista?")) { minhaLista = []; salvar(); atualizar(); } }

        renderizarHome(produtos);
    </script>
</body>
</html>
